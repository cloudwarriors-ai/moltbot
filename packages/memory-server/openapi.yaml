openapi: 3.1.0
info:
  title: OpenClaw Memory Server API
  version: 0.1.0
  description: Centralized tenant-safe memory CRUD and semantic search API.
servers:
  - url: https://memory.local
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /memories:
    post:
      summary: Create memory record
      operationId: createMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
  /memories/search:
    post:
      summary: Search memories for authenticated tenant
      operationId: searchMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchMemoriesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchMemoriesResponse"
  /memories/list:
    post:
      summary: List memories for authenticated tenant with cursor pagination
      operationId: listMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListMemoriesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMemoriesResponse"
  /memories/bulk:
    post:
      summary: Bulk create memories
      operationId: bulkCreateMemories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateResponse"
  /memories/upsert:
    post:
      summary: Upsert a memory by ID
      operationId: upsertMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertMemoryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
  /memories/{memory_id}:
    get:
      summary: Get memory by ID
      operationId: getMemory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: include_deleted
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
    put:
      summary: Upsert memory by ID from path
      operationId: upsertMemoryById
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
    delete:
      summary: Soft-delete memory by ID
      operationId: deleteMemory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
  /memories/timeline:
    get:
      summary: List memories in chronological order for a time range
      operationId: timelineMemories
      parameters:
        - in: query
          name: namespace
          required: false
          schema:
            type: string
        - in: query
          name: kind
          required: false
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: include_deleted
          required: false
          schema:
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineMemoriesResponse"
  /memory/{memory_id}:
    get:
      summary: Compatibility alias for /memories/{memory_id}
      operationId: getMemoryCompat
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    put:
      summary: Compatibility alias for PUT /memories/{memory_id}
      operationId: putMemoryCompat
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    delete:
      summary: Compatibility alias for DELETE /memories/{memory_id}
      operationId: deleteMemoryCompat
      parameters:
        - in: path
          name: memory_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
  /memory/timeline:
    get:
      summary: Compatibility alias for /memories/timeline
      operationId: timelineMemoriesCompat
      responses:
        "200":
          description: OK
  /memories/migrate/file-core:
    post:
      summary: Import legacy file memory records (admin only)
      operationId: migrateFileCore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateRequest"
      responses:
        "201":
          description: Created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Memory-API-Key
  schemas:
    CreateMemoryRequest:
      type: object
      additionalProperties: false
      required: [namespace, kind, content]
      properties:
        namespace:
          type: string
          minLength: 1
        kind:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        metadata:
          type: object
          additionalProperties: true
        source_ref:
          type: string
    UpsertMemoryRequest:
      allOf:
        - $ref: "#/components/schemas/CreateMemoryRequest"
        - type: object
          required: [id]
          properties:
            id:
              type: string
              format: uuid
    BulkCreateRequest:
      type: object
      additionalProperties: false
      required: [records]
      properties:
        records:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/CreateMemoryRequest"
    SearchMemoriesRequest:
      type: object
      additionalProperties: false
      required: [query_text]
      properties:
        query_text:
          type: string
          minLength: 1
        namespace:
          type: string
        metadata_filters:
          type: object
          additionalProperties: true
        embedding_model:
          type: string
          minLength: 1
        embedding_version:
          type: string
          minLength: 1
        include_deleted:
          type: boolean
          default: false
        top_k:
          type: integer
          minimum: 1
          maximum: 50
        min_score:
          type: number
          minimum: 0
          maximum: 1
    ListMemoriesRequest:
      type: object
      additionalProperties: false
      properties:
        namespace:
          type: string
        kind:
          type: string
        metadata_filters:
          type: object
          additionalProperties: true
        include_deleted:
          type: boolean
          default: false
        cursor:
          type: string
          minLength: 1
        limit:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        sort_by:
          type: string
          enum: [created_at, updated_at]
          default: created_at
        sort_order:
          type: string
          enum: [asc, desc]
          default: desc
    MemoryRecord:
      type: object
      required: [id, tenant_id, namespace, kind, content, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        namespace:
          type: string
        kind:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        source_ref:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
    MemoryResponse:
      type: object
      required: [ok, trace_id, record]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
        record:
          $ref: "#/components/schemas/MemoryRecord"
    BulkCreateResponse:
      type: object
      required: [ok, trace_id, records]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
    SearchMemoriesResponse:
      type: object
      required: [ok, trace_id, records, scores, query_embedding_model, query_embedding_version]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
        scores:
          type: array
          items:
            type: number
        query_embedding_model:
          type: string
        query_embedding_version:
          type: string
    ListMemoriesResponse:
      type: object
      required: [ok, trace_id, records]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
        next_cursor:
          type: string
    TimelineMemoriesResponse:
      type: object
      required: [ok, trace_id, records]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRecord"
