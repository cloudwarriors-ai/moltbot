openapi: 3.1.0
info:
  title: SLM Control Plane API
  version: 0.3.0
  description: |
    Canonical API contract for SLM training pipeline (#5) and SLM-first supervisor runtime (#6).
    SLM operator UI is a standalone application (`apps/slm-dashboard`) and not embedded in the built-in
    moltbot Control UI. Gateway operator method namespace for that app is `slm.control.*`.
servers:
  - url: https://gateway.local
security:
  - bearerAuth: []
paths:
  /v1/slm/categories:
    get:
      summary: List QA categories for a tenant/provider/channel scope
      operationId: listQaCategories
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
        - in: query
          name: provider_key
          required: false
          schema:
            $ref: '#/components/schemas/KeyField'
        - in: query
          name: channel_key
          required: false
          schema:
            $ref: '#/components/schemas/KeyField'
        - in: query
          name: include_inactive
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 2048
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [records, next_cursor]
                    properties:
                      records:
                        type: array
                        items:
                          $ref: '#/components/schemas/QaCategoryRecord'
                      next_cursor:
                        type: string
                        nullable: true
    post:
      summary: Create a QA category for API-first library workflows
      operationId: createQaCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [record]
                    properties:
                      record:
                        $ref: '#/components/schemas/QaCategoryRecord'
  /v1/slm/categories/{category_id}:
    patch:
      summary: Update category display/active/sort metadata
      operationId: updateQaCategory
      parameters:
        - in: path
          name: category_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [record]
                    properties:
                      record:
                        $ref: '#/components/schemas/QaCategoryRecord'
  /v1/slm/qa:
    get:
      summary: List QA records with tenant/category/status/query filters
      operationId: listQaRecords
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
        - in: query
          name: provider_key
          required: false
          schema:
            $ref: '#/components/schemas/KeyField'
        - in: query
          name: channel_key
          required: false
          schema:
            $ref: '#/components/schemas/KeyField'
        - in: query
          name: category_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            $ref: '#/components/schemas/QaRecordStatus'
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 2048
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 4000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [records, next_cursor]
                    properties:
                      records:
                        type: array
                        items:
                          $ref: '#/components/schemas/QaProjectionRecord'
                      next_cursor:
                        type: string
                        nullable: true
    post:
      summary: Create a QA record in the library namespace
      operationId: createQaRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QaCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [record]
                    properties:
                      record:
                        $ref: '#/components/schemas/QaProjectionRecord'
  /v1/slm/qa/{projection_id}:
    get:
      summary: Fetch a QA record by projection ID
      operationId: getQaRecord
      parameters:
        - in: path
          name: projection_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [record]
                    properties:
                      record:
                        $ref: '#/components/schemas/QaProjectionRecord'
    put:
      summary: Update a QA record by projection ID
      operationId: updateQaRecordById
      parameters:
        - in: path
          name: projection_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QaUpdateByIdRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [record]
                    properties:
                      record:
                        $ref: '#/components/schemas/QaProjectionRecord'
  /v1/slm/qa-events/import:
    post:
      summary: Import approved Q&A events into canonical training records
      operationId: importApprovedQa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportQaRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
  /v1/slm/datasets/build:
    post:
      summary: Build train/eval dataset artifacts
      operationId: buildDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildDatasetRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedResponse'
  /v1/slm/training/runs:
    post:
      summary: Start a new training run
      operationId: startTrainingRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTrainingRunRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AcceptedResponse'
                  - type: object
                    required: [run_id, status, attempts]
                    properties:
                      run_id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [queued, running, succeeded, failed, canceled]
                      attempts:
                        type: integer
                        minimum: 1
  /v1/slm/training/runs/{run_id}:
    get:
      summary: Fetch training run status
      operationId: getTrainingRun
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - $ref: '#/components/schemas/TrainingRun'
  /v1/slm/eval/review-queue:
    get:
      summary: Fetch evaluator review items
      operationId: getReviewQueue
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/EvalItem'
  /v1/slm/eval/review/{item_id}:
    post:
      summary: Submit reviewer rubric and correction
      operationId: submitReview
      parameters:
        - in: path
          name: item_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitReviewRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [item]
                    properties:
                      item:
                        $ref: '#/components/schemas/EvalItem'
  /v1/slm/feedback/apply:
    post:
      summary: Apply approved feedback into repair dataset inputs
      operationId: applyFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyFeedbackRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AcceptedResponse'
                  - type: object
                    required: [applied_count, feedback_ids]
                    properties:
                      applied_count:
                        type: integer
                        minimum: 0
                      feedback_ids:
                        type: array
                        items:
                          type: string
                          format: uuid
  /v1/slm/supervisor/respond:
    post:
      summary: Execute SLM-first answer with optional supervisor escalation
      operationId: supervisorRespond
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupervisorRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - $ref: '#/components/schemas/SupervisorResponse'
  /v1/slm/supervisor/traces:
    get:
      summary: List tenant traces for SLM supervisor decisions
      operationId: supervisorTraces
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [traces]
                    properties:
                      traces:
                        type: array
                        items:
                          $ref: '#/components/schemas/DecisionTrace'
  /v1/slm/supervisor/feedback:
    post:
      summary: Persist reviewer or user feedback for a supervisor trace
      operationId: supervisorFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupervisorFeedbackRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    required: [feedback_id, trace_id]
                    properties:
                      feedback_id:
                        type: string
                        format: uuid
                      trace_id:
                        type: string
                        format: uuid
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    KeyField:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-zA-Z0-9][a-zA-Z0-9_.-]*$'
    QaRecordStatus:
      type: string
      enum: [draft, validated, archived]
    QaRecordOrigin:
      type: string
      enum: [manual, studio, import]
    AcceptedResponse:
      type: object
      required: [ok, trace_id]
      properties:
        ok:
          type: boolean
          const: true
        trace_id:
          type: string
          format: uuid
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true
    QaCategoryRecord:
      type: object
      additionalProperties: false
      required:
        - category_id
        - tenant_id
        - provider_key
        - channel_key
        - category_key
        - display_name
        - is_active
        - sort_order
        - created_at
        - updated_at
      properties:
        category_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_key:
          $ref: '#/components/schemas/KeyField'
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        is_active:
          type: boolean
        sort_order:
          type: integer
          minimum: 0
          maximum: 100000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    QaProjectionRecord:
      type: object
      additionalProperties: false
      required:
        - projection_id
        - tenant_id
        - question
        - answer
        - status
        - origin
        - approved_at
        - updated_at
      properties:
        projection_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        question:
          type: string
          minLength: 1
          maxLength: 4000
        answer:
          type: string
          minLength: 1
          maxLength: 12000
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_id:
          type: string
          format: uuid
        category_key:
          $ref: '#/components/schemas/KeyField'
        status:
          $ref: '#/components/schemas/QaRecordStatus'
        origin:
          $ref: '#/components/schemas/QaRecordOrigin'
        source_channel:
          type: string
        source_ref:
          type: string
        trace_id:
          type: string
          format: uuid
        ref_id:
          type: string
        approved_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CategoryCreateRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, provider_key, channel_key, category_key, display_name]
      properties:
        tenant_id:
          type: string
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_key:
          $ref: '#/components/schemas/KeyField'
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        sort_order:
          type: integer
          minimum: 0
          maximum: 100000
          default: 1000
    CategoryUpdateRequest:
      type: object
      additionalProperties: false
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        is_active:
          type: boolean
        sort_order:
          type: integer
          minimum: 0
          maximum: 100000
    QaCreateRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, question, answer, provider_key, channel_key, category_id]
      properties:
        tenant_id:
          type: string
        question:
          type: string
          minLength: 1
          maxLength: 4000
        answer:
          type: string
          minLength: 1
          maxLength: 12000
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_id:
          type: string
          format: uuid
        category_key:
          $ref: '#/components/schemas/KeyField'
        status:
          $ref: '#/components/schemas/QaRecordStatus'
        origin:
          $ref: '#/components/schemas/QaRecordOrigin'
        source_channel:
          type: string
          minLength: 1
          maxLength: 200
        source_ref:
          type: string
          minLength: 1
          maxLength: 512
        trace_id:
          type: string
          format: uuid
        ref_id:
          type: string
          minLength: 1
          maxLength: 200
    QaUpdateByIdRequest:
      type: object
      additionalProperties: false
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        question:
          type: string
          minLength: 1
          maxLength: 4000
        answer:
          type: string
          minLength: 1
          maxLength: 12000
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_id:
          type: string
          format: uuid
        category_key:
          $ref: '#/components/schemas/KeyField'
        status:
          $ref: '#/components/schemas/QaRecordStatus'
        origin:
          $ref: '#/components/schemas/QaRecordOrigin'
        source_channel:
          type: string
          minLength: 1
          maxLength: 200
        source_ref:
          type: string
          minLength: 1
          maxLength: 512
        trace_id:
          type: string
          format: uuid
        ref_id:
          type: string
          minLength: 1
          maxLength: 200
    ImportQaRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, source, idempotency_key]
      properties:
        tenant_id:
          type: string
        source:
          type: string
          enum: [zoom, library]
        provider_key:
          $ref: '#/components/schemas/KeyField'
        channel_key:
          $ref: '#/components/schemas/KeyField'
        category_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/QaRecordStatus'
        idempotency_key:
          type: string
          minLength: 8
    BuildDatasetRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, split_seed, idempotency_key]
      properties:
        tenant_id:
          type: string
        split_seed:
          type: integer
          minimum: 1
        idempotency_key:
          type: string
          minLength: 8
    StartTrainingRunRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, dataset_id, base_model, idempotency_key]
      properties:
        tenant_id:
          type: string
        dataset_id:
          type: string
          format: uuid
        base_model:
          type: string
        idempotency_key:
          type: string
          minLength: 8
    TrainingRun:
      type: object
      required: [run_id, tenant_id, dataset_id, status, started_at]
      properties:
        run_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        dataset_id:
          type: string
          format: uuid
        adapter_path:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        error_message:
          type: string
    EvalItem:
      type: object
      additionalProperties: false
      required: [item_id, run_id, tenant_id, prompt, model_answer, gold_answer, review_state]
      properties:
        item_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        prompt:
          type: string
        model_answer:
          type: string
        gold_answer:
          type: string
        citations:
          type: array
          items:
            type: string
        review_state:
          type: string
          enum: [pending, in_review, completed, discarded]
    SubmitReviewRequest:
      type: object
      additionalProperties: false
      required: [score_accuracy, score_grounding, score_actionability, corrected_answer]
      properties:
        score_accuracy:
          type: number
          minimum: 0
          maximum: 1
        score_grounding:
          type: number
          minimum: 0
          maximum: 1
        score_actionability:
          type: number
          minimum: 0
          maximum: 1
        corrected_answer:
          type: string
          minLength: 1
        notes:
          type: string
          maxLength: 4000
    ApplyFeedbackRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, run_id, item_ids, idempotency_key]
      properties:
        tenant_id:
          type: string
        run_id:
          type: string
          format: uuid
        item_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        max_ratio:
          type: number
          minimum: 0.05
          maximum: 1
          default: 0.3
        idempotency_key:
          type: string
          minLength: 8
    SupervisorRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, channel_id, user_message]
      properties:
        tenant_id:
          type: string
        channel_id:
          type: string
        user_message:
          type: string
        context_refs:
          type: array
          items:
            type: string
    SupervisorResponse:
      type: object
      required: [final_answer, source_path, trace_id, reason_codes, policy_flags]
      properties:
        final_answer:
          type: string
        source_path:
          type: string
          enum: [slm_only, slm_plus_supervisor, frontier_direct_fallback]
        trace_id:
          type: string
          format: uuid
        reason_codes:
          type: array
          items:
            type: string
        policy_flags:
          type: array
          items:
            type: string
    DecisionTrace:
      type: object
      additionalProperties: false
      required:
        - trace_id
        - tenant_id
        - channel_id
        - user_message
        - source_path
        - reason_codes
        - policy_flags
        - slm_confidence
        - grounding_score
        - created_at
      properties:
        trace_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        channel_id:
          type: string
        user_message:
          type: string
        source_path:
          type: string
          enum: [slm_only, slm_plus_supervisor, frontier_direct_fallback]
        reason_codes:
          type: array
          items:
            type: string
        policy_flags:
          type: array
          items:
            type: string
        slm_confidence:
          type: number
          minimum: 0
          maximum: 1
        grounding_score:
          type: number
          minimum: 0
          maximum: 1
        created_at:
          type: string
          format: date-time
    SupervisorFeedbackRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, trace_id, feedback_type]
      properties:
        tenant_id:
          type: string
        trace_id:
          type: string
          format: uuid
        feedback_type:
          type: string
          enum: [thumbs_up, thumbs_down]
        comment:
          type: string
          minLength: 1
          maxLength: 2000
